<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora-Elétrica</title>
    <script type="module" src="arquivosJS/main.js" defer></script> 
    <link rel="stylesheet" type="text/css" href="style.css">
    <!-- Link's das Fontes: -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">

<body>

        <h1>CALCULADORA ELÉTRICA</h1>

        <div class="botoes">
            <button class="botao" id="btnConsumo">Consumo energético</button>

            <button class="botao" id="btnResistores">Cálculo de resistores</button>
            <button class="botao" id="btnReq">Resistência equivalente</button>

    </div>
